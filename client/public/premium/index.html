<script>
// Auto-reload when files change
(function() {
  const filesToWatch = ['/premium/_motion.jsx', '/premium/app-main.jsx', '/premium/translations-en.jsx', '/premium/translations-nl.jsx', '/premium/translations-en-2.jsx', '/premium/translations-nl-2.jsx', '/premium/config.jsx', '/premium/trust-strip.jsx', '/premium/conversation-card.jsx', '/premium/01-nav.jsx', '/premium/02-hero.jsx', '/premium/03-approach.jsx', '/premium/04-process.jsx', '/premium/05-pipeline.jsx', '/premium/06-audit.jsx', '/premium/07-demo.jsx', '/premium/08-about.jsx', '/premium/09-faq.jsx', '/premium/footer-mark.jsx', '/premium/10-cta-footer.jsx'];
  let hashes = {};

  async function hashContent(text) {
    const msgUint8 = new TextEncoder().encode(text);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function checkForChanges() {
    let reloadNeeded = false;
    for (const file of filesToWatch) {
      try {
        const response = await fetch(file + '?t=' + Date.now());
        const text = await response.text();
        const hash = await hashContent(text);

        if (hashes[file] && hashes[file] !== hash) {
          console.log(`📝 ${file} changed`);
          reloadNeeded = true;
        }
        hashes[file] = hash;
      } catch (e) {
        console.error(`Error checking ${file}:`, e);
      }
    }
    if (reloadNeeded) {
      console.log('🔄 Reloading...');
      setTimeout(() => window.location.reload(), 500);
    }
  }

  // Check every 2 seconds
  setInterval(checkForChanges, 2000);
  // Initial hash
  checkForChanges();
})();
</script>
