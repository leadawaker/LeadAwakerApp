<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Design System — Lead Awaker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=Yeseva+One&family=Geist+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&family=EB+Garamond:ital@0;1&family=Playfair+Display:ital@0;1&family=Bodoni+Moda:ital@0;1&family=Lora:ital@0;1&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/premium/design-tokens.css" />
<style>
  /* ----- components.html — design system page only ----- */
  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* TOC sidebar */
  .ds-toc-link { display: block; font-family: var(--sans); font-size: 13px; padding: 6px 10px; border-radius: 6px; border-left: 2px solid transparent; transition: all 150ms ease; text-decoration: none; }
  .ds-toc-link:hover { color: var(--ink) !important; background: rgba(0,0,0,0.04); }
  .ds-toc-link.active { color: var(--wine) !important; background: var(--wine-tint); border-left-color: var(--wine); font-weight: 600; }

  /* Audit tool controls (audit.jsx) */
  .audit-slider { -webkit-appearance: none; appearance: none; display: block; width: 100%; height: 40px; outline: none; cursor: pointer; background: transparent; padding: 0; margin: 0; border: none; }
  .audit-slider::-webkit-slider-container { overflow: visible; }
  .audit-slider::-webkit-slider-runnable-track { height: 8px; border-radius: 999px; background: linear-gradient(to right, rgba(94,34,48,0.38) var(--pct, 0%), var(--bg-2) var(--pct, 0%)); box-shadow: var(--sh-inset-crisp); }
  .audit-slider::-moz-range-track { height: 8px; border-radius: 999px; background: var(--bg-2); box-shadow: var(--sh-inset-crisp); }
  .audit-slider::-moz-range-progress { height: 8px; border-radius: 999px; background: rgba(94,34,48,0.38); }
  .audit-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; margin-top: calc((8px - 20px) / 2); border-radius: 50%; background: linear-gradient(145deg, var(--wine-soft), var(--wine)); box-shadow: var(--sh-raised-crisp), 0 0 0 2px rgba(255,252,244,0.95); cursor: grab; transition: transform 100ms ease; }
  .audit-slider:active::-webkit-slider-thumb { cursor: grabbing; transform: scale(1.12); }
  .audit-slider::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; border: none; background: linear-gradient(145deg, var(--wine-soft), var(--wine)); box-shadow: var(--sh-raised-crisp), 0 0 0 2px rgba(255,252,244,0.95); cursor: grab; }
  .audit-bar-track { height: 10px; border-radius: 999px; position: relative; background: var(--bg-2); box-shadow: var(--sh-inset-crisp); }
  .audit-bar-fill { position: absolute; top: 2px; left: 0; bottom: 2px; border-radius: 999px; transition: width 300ms cubic-bezier(.4,0,.2,1); }
  .audit-pressed { background: var(--bg); box-shadow: var(--sh-inset-large); }
  .neu-toggle { display: inline-flex; border-radius: 999px; padding: 3px; gap: 2px; background: var(--bg); box-shadow: var(--sh-inset-crisp); }
  .neu-toggle-btn { padding: 4px 11px; border-radius: 999px; border: none; cursor: pointer; font-family: var(--sans); font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; background: transparent; color: var(--mute-2); transition: all 140ms ease; }
  .neu-toggle-on { background: linear-gradient(145deg, var(--wine-soft), var(--wine)); box-shadow: var(--sh-raised-crisp); color: #fff; }
  .mode-toggle-wrap { display: inline-flex; border-radius: 999px; padding: 4px; gap: 3px; background: var(--bg); box-shadow: var(--sh-inset-crisp); }
  .mode-toggle-btn { padding: 7px 22px; border-radius: 999px; border: none; cursor: pointer; font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; background: transparent; color: var(--mute); transition: all 180ms ease; }
  .mode-toggle-btn.active { background: linear-gradient(145deg, var(--wine-soft), var(--wine)); box-shadow: var(--sh-raised-crisp); color: #fff; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="/premium/tweaks-panel.jsx"></script>
<script type="text/babel" src="/premium/config.jsx"></script>
<script type="text/babel" src="/premium/components.jsx"></script>

<script>
(function() {
  const filesToWatch = ['/premium/components.jsx', '/premium/config.jsx'];
  let hashes = {};

  async function hashContent(text) {
    const msgUint8 = new TextEncoder().encode(text);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function checkForChanges() {
    let reloadNeeded = false;
    for (const file of filesToWatch) {
      try {
        const response = await fetch(file + '?t=' + Date.now());
        const text = await response.text();
        const hash = await hashContent(text);
        if (hashes[file] && hashes[file] !== hash) { reloadNeeded = true; }
        hashes[file] = hash;
      } catch (e) {}
    }
    if (reloadNeeded) { setTimeout(() => window.location.reload(), 500); }
  }

  setInterval(checkForChanges, 2000);
  checkForChanges();
})();
</script>
</body>
</html>
