<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lead Awaker · Mobile</title>
<link rel="stylesheet" href="design-system.css">
<style>
  html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
  body { background: #1B1812; font-family: "Manrope", system-ui, sans-serif; }
  .density-regular { --pad: 24px; --pad-tight: 16px; --gap: 16px; }

  .stage {
    width: 100%; min-height: 100%; box-sizing: border-box;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; padding: 40px 20px;
    background:
      radial-gradient(120% 90% at 50% 0%, #241F18 0%, #1B1812 60%, #15120D 100%);
  }
  .stage-cap {
    font-family: "Manrope", system-ui, sans-serif; text-align: center;
    color: rgba(220,205,185,0.5); font-size: 12px; letter-spacing: 0.16em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="tasks-data.js"></script>
<script src="leads-data.js"></script>
<script src="calendar-data.js"></script>
<script src="billing-data.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="layout-bold.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="mobile-shell.jsx"></script>
<script type="text/babel" src="mobile-detail.jsx"></script>
<script type="text/babel" src="mobile-tasks.jsx"></script>
<script type="text/babel" src="mobile-leads.jsx"></script>
<script type="text/babel" src="mobile-calendar.jsx"></script>
<script type="text/babel" src="billing-components.jsx"></script>
<script type="text/babel" src="billing-views.jsx"></script>
<script type="text/babel" src="mobile-billing.jsx"></script>
<script type="text/babel" src="mobile-billing-app.jsx"></script>
<script type="text/babel" src="mobile-app.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <div className="stage density-regular">
      <div style={{ width: 412 }}>
        <AndroidDevice bg="var(--bg)">
          <MobileApp />
        </AndroidDevice>
      </div>
      <div className="stage-cap">Lead Awaker · Android — Campaigns, Leads, Tasks, Calendar &amp; Billing live</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
