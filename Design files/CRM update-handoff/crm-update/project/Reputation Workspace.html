<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lead Awaker · Reputation</title>
<link rel="stylesheet" href="design-system.css">
<style>
  html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: "Manrope", system-ui, sans-serif; }
  .density-compact { --pad: 18px; --pad-tight: 12px; --gap: 12px; }
  .density-regular { --pad: 24px; --pad-tight: 16px; --gap: 16px; }
  .density-comfy   { --pad: 32px; --pad-tight: 22px; --gap: 22px; }
  .font-instrument { --serif: "Instrument Serif", Georgia, serif; }
  .font-newsreader { --serif: "Newsreader", Georgia, serif; }
  .font-garamond   { --serif: "EB Garamond", Georgia, serif; }
  .font-playfair   { --serif: "Playfair Display", Georgia, serif; }

  /* focus ring per brand spec */
  .la-app a:focus-visible, .la-app button:focus-visible, .la-app textarea:focus-visible, .la-app input:focus-visible {
    outline: 2px solid var(--wine); outline-offset: 2px; border-radius: var(--r-button);
  }

  /* ─── AI composer "thinking" shimmer ─── */
  .rep-shimmer {
    background: linear-gradient(100deg, var(--line) 20%, var(--mute-2) 40%, var(--line) 60%);
    background-size: 220% 100%;
    animation: rep-shimmer 1.1s ease-in-out infinite;
    opacity: 0.55;
  }
  @keyframes rep-shimmer { 0% { background-position: 140% 0; } 100% { background-position: -40% 0; } }

  .rep-dots { display: inline-flex; gap: 3px; }
  .rep-dots i { width: 4px; height: 4px; border-radius: 50%; background: var(--wine); animation: rep-bounce 1s ease-in-out infinite; }
  .rep-dots i:nth-child(2) { animation-delay: 0.15s; }
  .rep-dots i:nth-child(3) { animation-delay: 0.3s; }
  @keyframes rep-bounce { 0%, 100% { transform: translateY(0); opacity: 0.45; } 50% { transform: translateY(-3px); opacity: 1; } }

  @media (prefers-reduced-motion: reduce) {
    .rep-shimmer, .rep-dots i { animation: none; }
  }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#ECE7DD"/>
    <path d="M50 30 l5.2 10.6 11.7 1.7-8.5 8.3 2 11.6L50 68.5 37.6 62.1l2-11.6-8.5-8.3 11.7-1.7z" fill="#5E2230"/>
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="reputation-data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="reputation-components.jsx"></script>
<script type="text/babel" src="reputation-overview.jsx"></script>
<script type="text/babel" src="reputation-feedback.jsx"></script>
<script type="text/babel" src="reputation-settings.jsx"></script>
<script type="text/babel" src="reputation-app.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lightAngle": 25,
  "lightIntensity": 0.35,
  "depthScale": 1.85,
  "density": "compact",
  "displayFont": "playfair",
  "workspaceState": "connected",
  "defaultTab": "inbox",
  "autoDefault": "4"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const root = document.documentElement;
    const rad = (t.lightAngle * Math.PI) / 180;
    root.style.setProperty('--lx',              Math.cos(rad).toFixed(3));
    root.style.setProperty('--ly',              (-Math.sin(rad)).toFixed(3));
    root.style.setProperty('--light-x',         `${50 + Math.cos(rad) * 45}%`);
    root.style.setProperty('--light-y',         `${50 - Math.sin(rad) * 45}%`);
    root.style.setProperty('--light-intensity', t.lightIntensity);
    root.style.setProperty('--depth-scale',     t.depthScale);
    root.style.setProperty('--light-strength',  t.depthScale);
  }, [t.lightAngle, t.lightIntensity, t.depthScale]);

  const cls = `density-${t.density} font-${t.displayFont}`;

  return (
    <>
      <div className={cls} style={{ width: '100%', height: '100%' }}>
        <RepWorkspace state={t.workspaceState} defaultTab={t.defaultTab} autoDefault={t.autoDefault === 'never' ? 'never' : Number(t.autoDefault)} />
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Workspace" />
        <TweakRadio  label="State" value={t.workspaceState}
                     options={[
                       { value: 'connected', label: 'Connected' },
                       { value: 'disconnected', label: 'Not connected' },
                       { value: 'caughtup', label: 'All caught up' },
                     ]}
                     onChange={(v) => setTweak('workspaceState', v)} />
        <TweakRadio  label="Landing tab" value={t.defaultTab}
                     options={[
                       { value: 'inbox', label: 'Inbox' },
                       { value: 'analytics', label: 'Analytics' },
                     ]}
                     onChange={(v) => setTweak('defaultTab', v)} />
        <TweakSelect label="Automation rule" value={t.autoDefault}
                     options={[
                       { value: 'never', label: 'Manual (never auto-post)' },
                       { value: '5', label: 'Auto 5★ and up' },
                       { value: '4', label: 'Auto 4★ and up' },
                       { value: '3', label: 'Auto 3★ and up' },
                     ]}
                     onChange={(v) => setTweak('autoDefault', v)} />
        <TweakSection label="Light" />
        <TweakSlider label="Angle"     value={t.lightAngle}     min={0}    max={180}  step={5}   unit="°"
                     onChange={(v) => setTweak('lightAngle', v)} />
        <TweakSlider label="Intensity" value={Math.round(t.lightIntensity * 100) / 100}
                     min={0} max={1.5} step={0.05} onChange={(v) => setTweak('lightIntensity', v)} />
        <TweakSection label="Depth" />
        <TweakSlider label="Shadow scale" value={Math.round(t.depthScale * 100) / 100}
                     min={0.35} max={1.85} step={0.05} unit="×" onChange={(v) => setTweak('depthScale', v)} />
        <TweakSection label="Layout" />
        <TweakRadio  label="Density" value={t.density} options={['compact','regular','comfy']}
                     onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Typography" />
        <TweakSelect label="Display font" value={t.displayFont}
                     options={[
                       { value: 'instrument', label: 'Instrument Serif' },
                       { value: 'newsreader', label: 'Newsreader' },
                       { value: 'garamond',   label: 'EB Garamond' },
                       { value: 'playfair',   label: 'Playfair Display' },
                     ]}
                     onChange={(v) => setTweak('displayFont', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
