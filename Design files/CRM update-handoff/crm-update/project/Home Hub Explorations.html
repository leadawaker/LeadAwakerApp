<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lead Awaker · Home Hub — Explorations</title>
<link rel="stylesheet" href="design-system.css">
<style>
  html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
  body { background: #f0eee9; font-family: "Manrope", system-ui, sans-serif; }
  .home-tag {
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    letter-spacing: 0.13em; text-transform: uppercase; white-space: nowrap;
    padding: 3px 9px; border-radius: var(--r-flush);
    background: var(--surface); box-shadow: var(--sh-inset-crisp); flex-shrink: 0;
  }
  .home-card { transition: box-shadow 140ms, transform 140ms; }
  .home-card:hover { transform: translateY(-2px); box-shadow: var(--sh-raised-large); }
  .home-quick:hover { transform: translateY(-2px); box-shadow: var(--sh-raised-medium) !important; }
  .home-quick:active { transform: translateY(0); box-shadow: var(--sh-inset-crisp) !important; }
  .home-quick:hover span:last-child { color: var(--wine); }
  .home-needs-row:hover, .home-act-row:hover { background: var(--wine-tint); }
  .home-srow:hover { background: var(--wine-tint); }
  .home-open:hover { gap: 9px !important; }
  .home-upsell { transition: border-color 140ms, background 140ms; }
  .home-upsell:hover { border-color: var(--wine); background: var(--wine-tint); }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#ECE7DD"/>
    <rect x="30" y="30" width="40" height="40" rx="8" fill="#5E2230"/>
    <path d="M38 50 L46 50 M54 50 L62 50" stroke="#FFFBF7" stroke-width="3" stroke-linecap="round"/>
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="home-data.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="home-shell.jsx"></script>
<script type="text/babel" src="home-variations.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="home-hub" title="CRM Home Hub — “Command Center”" subtitle="Desktop · 3 layout directions · warm-bone neumorphic, wine accent">
        <DCArtboard id="a" label="A · Command Grid" width={1740} height={1252}><VariantA /></DCArtboard>
        <DCArtboard id="b" label="B · Triage-First" width={1740} height={1414}><VariantB /></DCArtboard>
        <DCArtboard id="c" label="C · Editorial North-Star" width={1740} height={1842}><VariantC /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
