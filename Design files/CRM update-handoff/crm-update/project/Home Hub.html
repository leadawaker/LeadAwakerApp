<title>Lead Awaker · Home Hub</title>
<link rel="stylesheet" href="design-system.css">
<style>
  html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: "Manrope", system-ui, sans-serif; }

  .home-tag {
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    letter-spacing: 0.13em; text-transform: uppercase; white-space: nowrap;
    padding: 3px 9px; border-radius: var(--r-flush);
    background: var(--surface); box-shadow: var(--sh-inset-crisp); flex-shrink: 0;
  }
  .home-card { transition: box-shadow 140ms, transform 140ms; }
  .home-card:hover { transform: translateY(-2px); box-shadow: var(--sh-raised-large); }
  .home-quick:hover { transform: translateY(-2px); box-shadow: var(--sh-raised-medium) !important; }
  .home-quick:active { transform: translateY(0); box-shadow: var(--sh-inset-crisp) !important; }
  .home-quick:hover span:last-child { color: var(--wine); }
  .home-needs-row:hover, .home-act-row:hover { background: var(--wine-tint); }
  .home-addbtn:hover { background: var(--wine-tint) !important; }
  .home-open:hover { gap: 9px !important; }
  .home-openbtn:hover { transform: translateY(-2px); box-shadow: var(--sh-raised-medium) !important; }
  .home-openbtn:active { transform: translateY(0); box-shadow: var(--sh-inset-crisp) !important; }
  .home-upsell { transition: border-color 140ms, background 140ms; }
  .home-upsell:hover { border-color: var(--wine); background: var(--wine-tint); }

  /* north-star clickable header (icon badge + service name) */
  .home-nsopen .ns-badge { transition: box-shadow 160ms, transform 160ms; }
  .home-nsopen .ns-name { transition: color 140ms; }
  .home-nsopen:hover .ns-badge { box-shadow: var(--sh-raised-tall); transform: translateY(-2px); }
  .home-nsopen:hover .ns-name { color: var(--wine); }
  .home-nsopen:focus-visible { outline: none; }
  .home-nsopen:focus-visible .ns-name { color: var(--wine); }
  .home-nsopen:focus-visible .ns-badge { box-shadow: var(--sh-raised-tall), 0 0 0 2px var(--wine); }

  /* focus ring per brand spec */
  .la-app a:focus-visible, .la-app button:focus-visible {
    outline: 2px solid var(--wine); outline-offset: 2px; border-radius: var(--r-button);
  }

  /* ─── microanimations (JS-revealed: resting state is always visible) ─── */
  @media (prefers-reduced-motion: no-preference) {
    .home-stage .home-rise {
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.6s cubic-bezier(.22,.7,.25,1), transform 0.6s cubic-bezier(.22,.7,.25,1);
    }
    .home-stage.shown .home-rise { opacity: 1; transform: none; }

    /* sparkline draws itself in once revealed */
    .home-stage .spark-draw { stroke-dasharray: 2000; stroke-dashoffset: 2000; transition: stroke-dashoffset 1s cubic-bezier(.4,.1,.2,1) 0.3s; }
    .home-stage.shown .spark-draw { stroke-dashoffset: 0; }
    .home-stage .spark-area, .home-stage .spark-dot { opacity: 0; transition: opacity 0.5s ease 0.7s; }
    .home-stage.shown .spark-area, .home-stage.shown .spark-dot { opacity: 1; }

    /* nav rows + chips slide on hover */
    .la-nav-item { transition: background 140ms, color 140ms, transform 140ms; }
    .la-nav-item:hover { transform: translateX(2px); }
    .home-open svg { transition: transform 160ms; }
    .home-open:hover svg { transform: translateX(3px); }
    .la-profile, .la-switcher { transition: box-shadow 140ms, transform 140ms; }
    .la-profile:hover, .la-switcher:hover { transform: translateY(-1px); }
  }
</style>
<link id="gfont-Libre-Baskerville" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@300;400;500;600;700&amp;display=swap">
